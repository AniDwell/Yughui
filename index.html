<body>

<div class="player-wrapper" id="playerWrap">
    <div class="spinner" id="spinner"></div>
    <div id="brightnessOverlay"></div>
    <div class="gesture-info" id="gestureInfo">Volume: 100%</div>

    <video id="mainVideo" crossorigin="anonymous" playsinline></video>
    <audio id="externalAudio"></audio>
    <div class="gesture-zone" id="leftGesture"></div><div class="gesture-zone" id="rightGesture"></div>

    <div class="ui-layer" id="uiLayer">
        <div class="top-gradient"></div><div class="bottom-gradient"></div>

            <div class="top-left">
                <div class="titles">
                    <div class="main-title" id="tTitle">Initializing...</div>
                    <div class="sub-title" id="tSub">Waiting for URL parameters</div>
                </div>
            </div>
            <div class="top-right">
                <button class="icon-btn tr-icon" onclick="openSheet('subSheet', event)" title="Subtitles"><svg viewBox="0 0 24 24"><path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 11H9.5v-1.5h-1.5v-2H9.5V10H11v5zm6 0h-1.5v-1.5h-1.5v-2h1.5V10H17v5z"/></svg></button>
                <button class="icon-btn tr-icon" onclick="openSheet('audioSheet', event)" title="Audio Tracks"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></button>
                <div class="hd-icon" onclick="openSheet('qualitySheet', event)">HD</div>
            </div>
        </div>

        <div class="center-controls">
            <div style="position: relative; display: flex; align-items: center; justify-content: center;">
                <div class="float-text" id="floatLeftTxt" style="right: 100%; margin-right: 15px;">-10s</div>
                <button class="icon-btn skip-icon" id="skipBackBtn" onclick="triggerSkip(-10, event)"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
            </div>
            <button class="icon-btn play-icon" id="playPauseBtn">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div style="position: relative; display: flex; align-items: center; justify-content: center;">
                <button class="icon-btn skip-icon" id="skipFwdBtn" onclick="triggerSkip(10, event)"><svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg></button>
                <div class="float-text" id="floatRightTxt" style="left: 100%; margin-left: 15px;">+10s</div>
            </div>
        </div>

        <div class="bottom-area">
            <div class="bottom-tools">
                <div class="tools-group tools-left">
                    <button class="icon-btn bot-icon lock-btn" id="lockBtn" onclick="toggleLock()">
                        <svg id="unlockedIcon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                        <svg id="lockedIcon" viewBox="0 0 24 24" style="display:none; fill: #ffffff;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>

                        <svg id="iconCrop" viewBox="0 0 24 24" style="display:none;"><path d="M17 15h2V7c0-1.1-.9-2-2-2H9v2h8v8zM7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v4h2v-4h4v-2H7z"/></svg>
                        <svg id="iconStretch" viewBox="0 0 24 24" style="display:none;"><path d="M3 5v4h2V5h4V3H5c-1.1 0-2 .9-2 2zm2 10H3v4c0 1.1.9 2 2 2h4v-2H5v-4zm14 4h-4v2h4c1.1 0 2-.9 2-2v-4h-2v4zm0-16h-4v2h4v4h2V5c0-1.1-.9-2-2-2z"/></svg>
                    </button>
                    <button class="speed-text" id="speedBtn" onclick="openSheet('speedSheet', event)">1.00x</button>
                </div>
                <div class="tools-group tools-right">
                    <button class="icon-btn bot-icon" onclick="togglePiP()"><svg viewBox="0 0 24 24"><path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 1.98 2 1.98h18c1.1 0 2-.88 2-1.98V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/></svg></button>
                    <button class="icon-btn bot-icon" onclick="toggleFullscreen()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
                </div>
            </div>
            <div class="progress-row">

                <div class="track" id="progressTrack"><div class="time-preview" id="timePreview">00:00</div><div class="buffer" id="bufferBar"></div><div class="progress" id="progressBar"></div><div id="markersContainer"></div></div>
                <span class="time" id="remTime">-00:00</span>
            </div>
        </div>

    <button class="skip-rect" id="skipPopup">Skip Intro</button>

        <input type="file" id="localSub" style="display:none;" accept=".srt,.vtt">
    </div>
    <div class="bottom-sheet" id="audioSheet">

        <input type="file" id="localAudio" style="display:none;" accept="audio/*">
    </div>
    <div class="bottom-sheet" id="speedSheet">
        <div class="ss-header-row"><span class="ss-label">Speed</span><span class="ss-val" id="ssValText">1.00x</span></div>

    // --- Firebase Setup ---
    const contentConfig = { apiKey: "AIzaSyAPLj8br4ZbM0OSRCQ80GNqyjXZ6fRAKOA", authDomain: "wuhq8q8q.firebaseapp.com", projectId: "wuhq8q8q" };
    const userConfig = { apiKey: "AIzaSyAF0DQCa4mXJfHGNaRMn1gOrj4GDfJxUao", authDomain: "aniplay-43240.firebaseapp.com", projectId: "aniplay-43240" };

    const existingApps = getApps();

    const contentApp = existingApps.find(a => a.name === "contentApp") || initializeApp(contentConfig, "contentApp");

    const contentDb = getFirestore(contentApp); const userDb = getFirestore(userApp); const auth = getAuth(userApp);
    const params = new URLSearchParams(window.location.search);

            const profileRef = doc(userDb, "users", currentUid, "profileData", currentProfileId);

    // --- Strict AV Sync Engine (NO BLACK SCREENS) ---
    function tryPlayMedia() {
        if(!isIntendedToPlay) return;
        if(useExtAudio) {
            if(video.readyState >= 3 && extAudio.readyState >= 3) {
                spinner.style.display = 'none';
                video.play().catch(()=>{}); extAudio.play().catch(()=>{});

    }

    // --- Low Internet Optimized Loading ---
    async function loadVideo() {
        if(!seriesId || !epId) return;
        try {
            spinner.style.display = 'block';
            const snap = await getDoc(doc(contentDb, "series", seriesId, "episodes", epId));
            if(snap.exists()) {
                videoData = snap.data(); fetchNextEpisodesData(); 
                const qList = document.getElementById('qualityList'); const aList = document.getElementById('audioList'); const sList = document.getElementById('subList');

                if (videoData.m3u8Url && videoData.m3u8Url.trim() !== "") {

    // --- Next Episodes / New Series Slider Logic ---
    async function fetchNextEpisodesData() {
        try {
            const epRef = collection(contentDb, "series", seriesId, "episodes");

                <div class="history-item" onclick="markAsWatchedAndGo('${item.id}', ${isSeries})">
                    <img src="${thumb}" class="history-bg" loading="lazy" alt="thumb">
                    <div class="history-gradient"></div>
                    <div class="history-title-container">
                        <span class="history-static-name">${title}</span>
                        <span class="history-separator">|</span>
                        <div class="history-marquee-wrapper"><span class="history-marquee-text">• ${sub}</span></div>
                    </div>
                </div>
            `;
        });
    }

    // --- Slider UI Toggles (PC & Mobile Swipe) ---
    window.toggleSliderUI = (forceShow) => {
        if(nextEpsData.length === 0) return;
        const overlay = document.getElementById('upNextOverlay'); const pcBtn = document.getElementById('pcSliderTrigger');
        if(typeof forceShow === 'boolean') overlay.classList.toggle('active', forceShow);
        else overlay.classList.toggle('active');
        if(pcBtn) pcBtn.style.display = overlay.classList.contains('active') ? 'none' : 'flex';
    };

    let swipeStartY = 0;
    wrap.addEventListener('touchstart', (e) => { if(e.target.closest('.track')) return; swipeStartY = e.touches[0].clientY; }, {passive: true});
    wrap.addEventListener('touchend', (e) => {
        if(swipeStartY === 0 || e.target.closest('.track')) return;
        let diffY = swipeStartY - e.changedTouches[0].clientY;
        if(diffY > 50) toggleSliderUI(true);       // Swipe Up -> Show
        else if(diffY < -50) toggleSliderUI(false); // Swipe Down -> Hide
        swipeStartY = 0;
    });

    // --- Center Double Tap & Sync Fixes ---
    let lastTapTime = 0, lastTapX = 0, uiToggleTimeout;
    wrap.addEventListener('click', (e) => {
        if(e.target.closest('.icon-btn') || e.target.closest('.bottom-sheet') || e.target.closest('.track') || e.target.closest('#upNextOverlay') || e.target.closest('.pc-slider-trigger') || e.target.closest('.autoplay-wrapper')) return;
        let now = Date.now(), currentX = e.clientX, screenW = window.innerWidth;
        if (document.querySelector('.bottom-sheet.active')) return;

        if (now - lastTapTime < 300 && Math.abs(currentX - lastTapX) < 50) {
            clearTimeout(uiToggleTimeout); 
            if (currentX < screenW * 0.35) { triggerSkip(-10); let dt = document.getElementById('dtLeft'); dt.classList.remove('tap-anim'); void dt.offsetWidth; dt.classList.add('tap-anim'); } 
            else if (currentX > screenW * 0.65) { triggerSkip(10); let dt = document.getElementById('dtRight'); dt.classList.remove('tap-anim'); void dt.offsetWidth; dt.classList.add('tap-anim'); } 
            else playPauseBtn.click();
            lastTapTime = 0; 
        } else {
            lastTapTime = now; lastTapX = currentX;
            uiToggleTimeout = setTimeout(() => { if(Date.now() - lastTapTime >= 300) { if(isUiVisible) hideUI(); else showUI(); } }, 300);
        }
    });

    playPauseBtn.addEventListener('click', (e) => { if(e) e.stopPropagation(); if(video.paused) { isIntendedToPlay = true; tryPlayMedia(); } else { isIntendedToPlay = false; video.pause(); if(useExtAudio) extAudio.pause(); } });
    video.addEventListener('play', () => { document.getElementById('playIcon').style.display='none'; document.getElementById('pauseIcon').style.display='block'; hideUI(); });
    video.addEventListener('pause', () => { document.getElementById('playIcon').style.display='block'; document.getElementById('pauseIcon').style.display='none'; showUI(); });

    video.addEventListener('timeupdate', () => {
        if (useExtAudio && !extAudio.paused && !video.paused) {
            let drift = video.currentTime - extAudio.currentTime;
            if (Math.abs(drift) > 0.4) extAudio.currentTime = video.currentTime; // Snap sync if drift > 400ms
        }
        requestAnimationFrame(() => {
            const curr = video.currentTime, dur = video.duration || 1; 
            document.getElementById('progressBar').style.width = (curr / dur * 100) + '%'; 
            if(video.buffered.length) document.getElementById('bufferBar').style.width = (video.buffered.end(video.buffered.length-1)/dur*100) + '%'; 
            document.getElementById('currTime').innerText = formatTime(curr); document.getElementById('remTime').innerText = "-" + formatTime(dur - curr); 
            
            if (Math.floor(curr) % 5 === 0 && epId && curr > 0) {
                localStorage.setItem(`vid_${epId}`, curr);
                if (currentUid && currentProfileId && Math.floor(curr) % 10 === 0) {
                    setDoc(doc(userDb, "users", currentUid, "profileData", currentProfileId), { continueWatching: { [seriesId]: { epId: epId, currentTime: curr, duration: dur, timestamp: Date.now() } } }, { merge: true }).catch(()=>{});
                }
            }
            
            let showSkip = false, skipTarget = 0, btnText = "";
            if (videoData) {
                if (videoData.introEnd && curr >= videoData.introStart && curr <= videoData.introEnd) { showSkip = true; skipTarget = videoData.introEnd; btnText = "Skip Intro"; }
                if (videoData.outroEnd && curr >= videoData.outroStart && curr <= videoData.outroEnd) { showSkip = true; skipTarget = videoData.outroEnd; btnText = "Skip Outro"; }
            }
            if(showSkip && !isLocked) { skipPopup.style.display = 'block'; skipPopup.innerText = btnText; skipPopup.onclick = (e) => { e.stopPropagation(); skipPopup.style.display = 'none'; video.currentTime = skipTarget; }; } else skipPopup.style.display = 'none';
        });
    });

    let autoplayTriggered = false;
    video.addEventListener('ended', () => { 
        if(!autoplayTriggered && isAutoPlay && nextEpsData.length > 0 && nextEpsData[0].dataType === 'episode') {
            autoplayTriggered = true; markAsWatchedAndGo(nextEpsData[0].id, false);
        } else toggleSliderUI(true);
    });

    video.addEventListener('ratechange', () => { if(useExtAudio) extAudio.playbackRate = video.playbackRate; });
    window.triggerSkip = (amount, e) => { if(e) e.stopPropagation(); if(isLocked) return; video.currentTime += amount; showUI(); if (amount > 0) { const btn = document.getElementById('skipFwdBtn'); const txt = document.getElementById('floatRightTxt'); btn.classList.remove('rotate-fwd'); txt.classList.remove('anim-float-fwd'); void btn.offsetWidth; btn.classList.add('rotate-fwd'); txt.classList.add('anim-float-fwd'); } else { const btn = document.getElementById('skipBackBtn'); const txt = document.getElementById('floatLeftTxt'); btn.classList.remove('rotate-bwd'); txt.classList.remove('anim-float-bwd'); void btn.offsetWidth; btn.classList.add('rotate-bwd'); txt.classList.add('anim-float-bwd'); } };
    window.toggleFullscreen = () => { if (!document.fullscreenElement) { wrap.requestFullscreen(); screen.orientation?.lock('landscape').catch(()=>{}); } else { document.exitFullscreen(); screen.orientation?.unlock(); } };
    window.togglePiP = async () => { if(document.pictureInPictureEnabled) await video.requestPictureInPicture(); };
    function applyScaleMode(index) { video.style.objectFit = ['contain', 'cover', 'fill'][index]; ['iconFit', 'iconCrop', 'iconStretch'].forEach((id, i) => document.getElementById(id).style.display = i === index ? 'block' : 'none'); }
    window.cycleScaleMode = () => { savedScaleMode = (savedScaleMode + 1) % 3; applyScaleMode(savedScaleMode); localStorage.setItem('aniplay_scale', savedScaleMode); };
    window.toggleLock = () => { isLocked = !isLocked; wrap.classList.toggle('locked', isLocked); document.getElementById('unlockedIcon').style.display = isLocked ? 'none' : 'block'; document.getElementById('lockedIcon').style.display = isLocked ? 'block' : 'none'; if(isLocked) { closeAllSheets(true); showUI(); } };
    window.openSheet = (id, e) => { if(e) e.stopPropagation(); closeAllSheets(true); document.getElementById(id).classList.add('active'); };
    window.closeAllSheets = (force = false) => { if(!force) return; document.querySelectorAll('.bottom-sheet').forEach(sheet => sheet.classList.remove('active')); };
    
    // UI Tools
    window.selectQuality = (elem, url) => { document.querySelectorAll('#qualityList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(url && video.src !== url) { const ct = video.currentTime; const p = video.paused; video.src = url; const resumeFunc = () => { try { video.currentTime = ct; } catch(e){} if(!p) tryPlayMedia(); }; if(video.readyState >= 1) resumeFunc(); else video.addEventListener('loadedmetadata', resumeFunc, { once: true }); } closeAllSheets(true); };
    window.selectHlsQuality = (elem, levelIndex) => { document.querySelectorAll('#qualityList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(hlsEngine) hlsEngine.currentLevel = levelIndex; closeAllSheets(true); };
    window.selectHlsAudio = (elem, trackIndex) => { document.querySelectorAll('#audioList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(hlsEngine) hlsEngine.audioTrack = trackIndex; closeAllSheets(true); };
    window.selectDbSub = (elem, trackIndex) => { document.querySelectorAll('#subList > .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); for (let i = 0; i < video.textTracks.length; i++) video.textTracks[i].mode = 'disabled'; if (trackIndex !== -1 && video.textTracks[trackIndex]) video.textTracks[trackIndex].mode = 'showing'; closeAllSheets(true); };
    window.selectAudio = (elem, url) => { document.querySelectorAll('#audioList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(url) { useExtAudio = true; video.muted = true; extAudio.src = url; extAudio.currentTime = video.currentTime; applyPitch(savedPitch); if(!video.paused) { isIntendedToPlay = true; tryPlayMedia(); } } else { useExtAudio = false; video.muted = false; extAudio.pause(); } closeAllSheets(true); };
    
    const ssSlider = document.getElementById('ssSlider'); const ssSliderFill = document.getElementById('ssSliderFill'); const ssValText = document.getElementById('ssValText');
    window.setPlaybackSpeed = (val) => { video.playbackRate = val; ssSlider.value = val; updateSpeedUI(val); localStorage.setItem('aniplay_speed', val); };
    ssSlider.addEventListener('input', (e) => { const val = parseFloat(e.target.value); video.playbackRate = val; updateSpeedUI(val); localStorage.setItem('aniplay_speed', val); });
    function updateSpeedUI(val) { const formatVal = val.toFixed(2) + "x"; document.getElementById('speedBtn').innerText = formatVal; ssValText.innerText = formatVal; const percentage = ((val - 0.25) / (3 - 0.25)) * 100; ssSliderFill.style.width = percentage + "%"; document.querySelectorAll('.ss-pill').forEach(pill => { const pillVal = parseFloat(pill.dataset.speed); if(pillVal === val) { pill.classList.add('active'); pill.innerText = formatVal + " ✕"; } else { pill.classList.remove('active'); pill.innerText = pillVal.toFixed(2) + "x"; } }); }
    window.togglePitch = () => { savedPitch = !savedPitch; document.getElementById('pitchToggle').classList.toggle('active', savedPitch); applyPitch(savedPitch); localStorage.setItem('aniplay_pitch', savedPitch); };

    // Drag Seek logic
    let isDragging = false, dragPct = 0; const tPreview = document.getElementById('timePreview');
    function getEventX(e) { return e.touches && e.touches.length > 0 ? e.touches[0].clientX : (e.changedTouches && e.changedTouches.length > 0 ? e.changedTouches[0].clientX : e.clientX); }
    function handleDrag(e) { const rect = track.getBoundingClientRect(); let pos = getEventX(e) - rect.left; pos = Math.max(0, Math.min(pos, rect.width)); dragPct = pos / rect.width; tPreview.innerText = formatTime(dragPct * (video.duration || 0)); tPreview.style.left = `${dragPct * 100}%`; tPreview.style.display = 'block'; if (isDragging) document.getElementById('progressBar').style.width = `${dragPct * 100}%`; }
    track.addEventListener('mousedown', (e) => { isDragging = true; handleDrag(e); }); document.addEventListener('mousemove', (e) => { if (isDragging) handleDrag(e); }); document.addEventListener('mouseup', () => { if (isDragging) { video.currentTime = dragPct * video.duration; isDragging = false; tPreview.style.display = 'none'; } }); track.addEventListener('mouseleave', () => { if (!isDragging) tPreview.style.display = 'none'; });
    track.addEventListener('touchstart', (e) => { isDragging = true; handleDrag(e); }); track.addEventListener('touchmove', (e) => { if (isDragging) { handleDrag(e); e.preventDefault(); } }, {passive: false}); track.addEventListener('touchend', () => { if (isDragging) { video.currentTime = dragPct * video.duration; isDragging = false; tPreview.style.display = 'none'; } });
    track.addEventListener('click', (e) => { e.stopPropagation(); if(isLocked) return; const p = (e.clientX - track.getBoundingClientRect().left) / track.getBoundingClientRect().width; video.currentTime = p * video.duration; });
    function formatTime(sec) { if (isNaN(sec)) return "00:00"; let h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0'), s = Math.floor(sec % 60).toString().padStart(2, '0'); return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`; }

    let timeoutId;
    function showUI() { uiLayer.classList.remove('hidden'); wrap.style.cursor = 'default'; isUiVisible = true; const pcBtn = document.getElementById('pcSliderTrigger'); if(pcBtn && !document.getElementById('upNextOverlay').classList.contains('active')) pcBtn.style.display = 'flex'; clearTimeout(timeoutId); timeoutId = setTimeout(() => { if(!video.paused && !isDragging) hideUI(); }, 3500); }
    function hideUI() { if(!video.paused && !document.querySelector('.bottom-sheet.active')) { uiLayer.classList.add('hidden'); wrap.style.cursor = 'none'; isUiVisible = false; const pcBtn = document.getElementById('pcSliderTrigger'); if(pcBtn) pcBtn.style.display = 'none'; } }
    let lastInteractType = ''; wrap.addEventListener('touchstart', () => { lastInteractType = 'touch'; }, {passive: true}); wrap.addEventListener('mousemove', () => { if(lastInteractType !== 'touch') showUI(); });
</script>
</body>
