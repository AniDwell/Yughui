<body>

<div class="player-wrapper" id="playerWrap">

                <button class="icon-btn tr-icon" onclick="openSheet('subSheet', event)" title="Subtitles"><svg viewBox="0 0 24 24"><path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 11H9.5v-1.5h-1.5v-2H9.5V10H11v5zm6 0h-1.5v-1.5h-1.5v-2h1.5V10H17v5z"/></svg></button>
                <button class="icon-btn tr-icon" onclick="openSheet('audioSheet', event)" title="Audio Tracks"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></button>
                <div class="hd-icon" onclick="openSheet('qualitySheet', event)">HD</div>
            </div>
        </div>

        <div class="center-controls">
            <div style="position: relative; display: flex; align-items: center; justify-content: center;">
                <div class="float-text" id="floatLeftTxt" style="right: 100%; margin-right: 15px;">-10s</div>
                <button class="icon-btn skip-icon" id="skipBackBtn" onclick="triggerSkip(-10, event)"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
            </div>

                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div style="position: relative; display: flex; align-items: center; justify-content: center;">
                <button class="icon-btn skip-icon" id="skipFwdBtn" onclick="triggerSkip(10, event)"><svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg></button>
                <div class="float-text" id="floatRightTxt" style="left: 100%; margin-left: 15px;">+10s</div>
            </div>
        </div>
        <button class="skip-rect" id="skipPopup">Skip Intro</button>

        <div class="bottom-area">
            <div class="bottom-tools">
                <div class="tools-group tools-left">
                    <button class="icon-btn bot-icon lock-btn" id="lockBtn" onclick="toggleLock()">
                        <svg id="unlockedIcon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                        <svg id="lockedIcon" viewBox="0 0 24 24" style="display:none; fill: #ffffff;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>

                    </button>
                    <button class="speed-text" id="speedBtn" onclick="openSheet('speedSheet', event)">1.00x</button>
                </div>
                <div class="tools-group tools-right">
                    <button class="icon-btn bot-icon" onclick="togglePiP()"><svg viewBox="0 0 24 24"><path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 1.98 2 1.98h18c1.1 0 2-.88 2-1.98V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/></svg></button>
                    <button class="icon-btn bot-icon" onclick="toggleFullscreen()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>

        <div class="ss-slider-container"><div class="ss-slider-fill" id="ssSliderFill" style="width: 50%;"></div><input type="range" min="0.25" max="3" step="0.05" value="1" class="ss-slider" id="ssSlider"></div>
        <div class="ss-presets" id="ssPresets">
            <button class="ss-pill" data-speed="0.25" onclick="setPlaybackSpeed(0.25)">0.25x</button><button class="ss-pill" data-speed="0.5" onclick="setPlaybackSpeed(0.5)">0.50x</button><button class="ss-pill" data-speed="0.75" onclick="setPlaybackSpeed(0.75)">0.75x</button><button class="ss-pill active" data-speed="1" onclick="setPlaybackSpeed(1)">1.00x ✕</button><button class="ss-pill" data-speed="1.25" onclick="setPlaybackSpeed(1.25)">1.25x</button><button class="ss-pill" data-speed="1.5" onclick="setPlaybackSpeed(1.5)">1.50x</button>
        </div>
        <div class="ss-pitch-row"><div class="ss-pitch-text"><span class="ss-pitch-title">Enable audio pitch correction</span><span class="ss-pitch-desc">Prevents the audio from becoming high-pitched at faster speeds</span></div><div class="toggle-container" onclick="togglePitch()"><div class="toggle-switch active" id="pitchToggle"><div class="toggle-thumb"></div></div></div></div>
        <button class="ss-main-btn" onclick="closeAllSheets()">Make default speed</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Initialize Firebase ONLY ONCE directly for DB access
    const videoApp = initializeApp({ apiKey: "AIzaSyAPLj8br4ZbM0OSRCQ80GNqyjXZ6fRAKOA", authDomain: "wuhq8q8q.firebaseapp.com", projectId: "wuhq8q8q", storageBucket: "wuhq8q8q.firebasestorage.app" }, "videoApp");
    const videoDb = getFirestore(videoApp);

    // Get URL Parameters
    const params = new URLSearchParams(window.location.search);
    const seriesId = params.get('seriesId');
    const epId = params.get('epId');

    const video = document.getElementById('mainVideo');
    const extAudio = document.getElementById('externalAudio');
    const uiLayer = document.getElementById('uiLayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const skipPopup = document.getElementById('skipPopup');
    const track = document.getElementById('progressTrack');
    const wrap = document.getElementById('playerWrap');
    const spinner = document.getElementById('spinner');

    let videoData = null, isPremium = true, adList = [], isLocked = false, isUiVisible = true;
    let useExtAudio = false, hlsEngine = null;

    let savedSpeed = parseFloat(localStorage.getItem('aniplay_speed')) || 1;
    let savedPitch = localStorage.getItem('aniplay_pitch') !== 'false';
    let savedScaleMode = parseInt(localStorage.getItem('aniplay_scale')) || 0;

    video.preservesPitch = savedPitch;
    if(!savedPitch) document.getElementById('pitchToggle').classList.remove('active');

    video.addEventListener('waiting', () => { spinner.style.display = 'block'; });
    video.addEventListener('playing', () => { spinner.style.display = 'none'; });
    video.addEventListener('canplay', () => { spinner.style.display = 'none'; });
    video.addEventListener('pause', () => { spinner.style.display = 'none'; });

    let audioCtx, trackSource, gainNode, isAudioSetup = false;
    function setupAudio() {
        if (isAudioSetup) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            trackSource = audioCtx.createMediaElementSource(video);
            gainNode = audioCtx.createGain();
            trackSource.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            isAudioSetup = true;
        } catch(e) {}
    }

    // MAIN LOAD FUNCTION - Called directly, no waiting for Auth
    async function loadVideo() {
        if(!seriesId || !epId) { 
            document.getElementById('tTitle').innerText = "URL ERROR: IDs Missing"; 
            document.getElementById('tSub').innerText = "Please ensure the link contains both ?seriesId=...&epId=..."; 
            return; 
        }

        try {
            document.getElementById('tTitle').innerText = "Fetching Episode...";
            document.getElementById('tSub').innerText = "Loading from Database...";
            spinner.style.display = 'block';

            const epRef = doc(videoDb, "series", seriesId, "episodes", epId);
            const snap = await getDoc(epRef);

            if(snap.exists()) {
                videoData = snap.data(); 
                
                let allSources = [];
                if(videoData.illusions && videoData.illusions.length > 0) allSources = videoData.illusions.map(i => ({ name: i.qualityName || i.quality || 'HD', url: i.url }));
                else if (videoData.videos && videoData.videos.length > 0) allSources = videoData.videos.map(v => ({ name: v.quality || 'Default', url: v.url }));

                const qList = document.getElementById('qualityList');
                if(allSources.length > 0) {
                    let mainUrl = allSources[0].url;
                    if (mainUrl.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
                        if(hlsEngine) hlsEngine.destroy(); hlsEngine = new Hls(); hlsEngine.loadSource(mainUrl); hlsEngine.attachMedia(video);
                        hlsEngine.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                            qList.innerHTML = '<div class="bs-item active" onclick="selectHlsQuality(this, -1)">Auto / Network Default</div>';
                            data.levels.forEach((level, index) => { qList.innerHTML += `<div class="bs-item" onclick="selectHlsQuality(this, ${index})">${level.height}p</div>`; });
                        });
                    } else {
                        video.src = mainUrl; qList.innerHTML = ''; 
                        allSources.forEach((src, index) => {
                            const item = document.createElement('div'); item.className = 'bs-item' + (index === 0 ? ' active' : ''); item.innerText = src.name;
                            item.onclick = function() { selectQuality(this, src.url); }; qList.appendChild(item);
                        });
                    }
                } else {
                    document.getElementById('tTitle').innerText = "No Sources Found";
                    document.getElementById('tSub').innerText = "This episode has no videos attached in DB.";
                    spinner.style.display = 'none';
                    return;
                }

                const aList = document.getElementById('audioList');
                if(videoData.audios && videoData.audios.length > 0) {
                    aList.innerHTML = ''; 
                    videoData.audios.forEach((aud, index) => {
                        const item = document.createElement('div'); item.className = 'bs-item' + (index === 0 ? ' active' : '');
                        item.innerText = aud.language || aud.name || 'Audio ' + (index + 1);
                        item.onclick = function() { selectAudio(this, aud.url); }; aList.appendChild(item);
                        if (index === 0) { useExtAudio = true; video.muted = true; extAudio.src = aud.url; }
                    });
                }

                const sList = document.getElementById('subList');
                if(videoData.subtitles && videoData.subtitles.length > 0) {
                    videoData.subtitles.forEach((sub, index) => {
                        const track = document.createElement('track'); track.kind = 'captions'; track.label = sub.language || sub.name || 'Sub ' + (index + 1); track.src = sub.url; video.appendChild(track);
                        const item = document.createElement('div'); item.className = 'bs-item'; item.innerText = track.label;
                        item.onclick = function() { selectDbSub(this, index); }; sList.insertBefore(item, sList.lastElementChild.previousElementSibling);
                    });
                }

                document.getElementById('tTitle').innerText = videoData.title || "Unknown Episode";
                document.getElementById('tSub').innerText = videoData.description || "Episode details unavailable.";

                const savedTime = localStorage.getItem(`vid_${epId}`); if(savedTime) video.currentTime = parseFloat(savedTime);
                setPlaybackSpeed(savedSpeed); applyScaleMode(savedScaleMode, false);

            } else {
                document.getElementById('tTitle').innerText = "404: Episode Not Found";
                document.getElementById('tSub').innerText = "Database me is ID ka koi data nahi mila.";
                spinner.style.display = 'none';
            }
        } catch(error) {
            console.error("Firebase Error:", error);
            document.getElementById('tTitle').innerText = "Database Error";
            document.getElementById('tSub').innerText = error.message;
            spinner.style.display = 'none';
        }
    }

    // Call it immediately
    loadVideo();

    playPauseBtn.addEventListener('click', (e) => { e.stopPropagation(); setupAudio(); video.paused ? video.play() : video.pause(); });
    video.addEventListener('play', () => { document.getElementById('playIcon').style.display='none'; document.getElementById('pauseIcon').style.display='block'; hideUI(); if(useExtAudio) extAudio.play(); });
    video.addEventListener('pause', () => { document.getElementById('playIcon').style.display='block'; document.getElementById('pauseIcon').style.display='none'; showUI(); if(useExtAudio) extAudio.pause(); });
    video.addEventListener('seeking', () => { if(useExtAudio) extAudio.currentTime = video.currentTime; });
    video.addEventListener('ratechange', () => { if(useExtAudio) extAudio.playbackRate = video.playbackRate; });

    window.triggerSkip = (amount, e) => {
        if(e) e.stopPropagation(); if(isLocked) return; video.currentTime += amount; showUI(); 
        if (amount > 0) { const btn = document.getElementById('skipFwdBtn'); const txt = document.getElementById('floatRightTxt'); btn.classList.remove('rotate-fwd'); txt.classList.remove('anim-float-fwd'); void btn.offsetWidth; btn.classList.add('rotate-fwd'); txt.classList.add('anim-float-fwd'); } 
        else { const btn = document.getElementById('skipBackBtn'); const txt = document.getElementById('floatLeftTxt'); btn.classList.remove('rotate-bwd'); txt.classList.remove('anim-float-bwd'); void btn.offsetWidth; btn.classList.add('rotate-bwd'); txt.classList.add('anim-float-bwd'); }
    };

    window.toggleFullscreen = () => { if (!document.fullscreenElement) { wrap.requestFullscreen(); screen.orientation?.lock('landscape').catch(()=>{}); } else { document.exitFullscreen(); screen.orientation?.unlock(); } };
    window.togglePiP = async () => { if(document.pictureInPictureEnabled) await video.requestPictureInPicture(); };
    function applyScaleMode(index) { video.style.objectFit = ['contain', 'cover', 'fill'][index]; ['iconFit', 'iconCrop', 'iconStretch'].forEach((id, i) => document.getElementById(id).style.display = i === index ? 'block' : 'none'); }
    window.cycleScaleMode = () => { savedScaleMode = (savedScaleMode + 1) % 3; applyScaleMode(savedScaleMode); localStorage.setItem('aniplay_scale', savedScaleMode); };

    window.toggleLock = () => { 
        isLocked = !isLocked; wrap.classList.toggle('locked', isLocked); 
        document.getElementById('unlockedIcon').style.display = isLocked ? 'none' : 'block';
        document.getElementById('lockedIcon').style.display = isLocked ? 'block' : 'none';
        if(isLocked) { closeAllSheets(); showUI(); }
    };
    
    window.openSheet = (id, e) => { if(e) e.stopPropagation(); closeAllSheets(); document.getElementById(id).classList.add('active'); };
    window.closeAllSheets = () => { document.querySelectorAll('.bottom-sheet').forEach(sheet => sheet.classList.remove('active')); };

    window.selectQuality = (elem, url) => { document.querySelectorAll('#qualityList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(url && video.src !== url) { const ct = video.currentTime; const p = video.paused; video.src = url; video.currentTime = ct; if(!p) video.play(); } closeAllSheets(); };
    window.selectHlsQuality = (elem, levelIndex) => { document.querySelectorAll('#qualityList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(hlsEngine) hlsEngine.currentLevel = levelIndex; closeAllSheets(); };
    window.selectDbSub = (elem, trackIndex) => { document.querySelectorAll('#subList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); for (let i = 0; i < video.textTracks.length; i++) video.textTracks[i].mode = 'disabled'; if (trackIndex !== -1 && video.textTracks[trackIndex]) video.textTracks[trackIndex].mode = 'showing'; closeAllSheets(); };
    window.selectAudio = (elem, url) => { document.querySelectorAll('#audioList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(url) { useExtAudio = true; video.muted = true; extAudio.src = url; extAudio.currentTime = video.currentTime; if(!video.paused) extAudio.play(); } else { useExtAudio = false; video.muted = false; extAudio.pause(); } closeAllSheets(); };

    document.getElementById('localSub').addEventListener('change', e => { if(e.target.files[0]) { const fileName = e.target.files[0].name; const t = document.createElement('track'); t.kind='captions'; t.src=URL.createObjectURL(e.target.files[0]); t.default=true; video.appendChild(t); const newItem = document.createElement('div'); newItem.className = 'bs-item active'; newItem.innerText = fileName.length > 20 ? fileName.substring(0, 20) + "..." : fileName; const newIndex = video.textTracks.length; newItem.onclick = function() { selectDbSub(this, newIndex); }; const sList = document.getElementById('subList'); document.querySelectorAll('#subList .bs-item').forEach(el => el.classList.remove('active')); sList.insertBefore(newItem, sList.lastElementChild.previousElementSibling); closeAllSheets(); } });
    document.getElementById('localAudio').addEventListener('change', e => { if(e.target.files[0]) { const fileName = e.target.files[0].name; const newItem = document.createElement('div'); newItem.className = 'bs-item active'; newItem.innerText = fileName.length > 20 ? fileName.substring(0, 20) + "..." : fileName; newItem.onclick = function() { selectAudio(this, URL.createObjectURL(e.target.files[0])); }; document.querySelectorAll('#audioList .bs-item').forEach(el => el.classList.remove('active')); document.getElementById('audioList').insertBefore(newItem, document.getElementById('audioList').lastElementChild); closeAllSheets(); } });

    const ssSlider = document.getElementById('ssSlider'); const ssSliderFill = document.getElementById('ssSliderFill'); const ssValText = document.getElementById('ssValText');
    window.setPlaybackSpeed = (val) => { video.playbackRate = val; ssSlider.value = val; updateSpeedUI(val); localStorage.setItem('aniplay_speed', val); };
    ssSlider.addEventListener('input', (e) => { const val = parseFloat(e.target.value); video.playbackRate = val; updateSpeedUI(val); localStorage.setItem('aniplay_speed', val); });
    function updateSpeedUI(val) { const formatVal = val.toFixed(2) + "x"; document.getElementById('speedBtn').innerText = formatVal; ssValText.innerText = formatVal; const percentage = ((val - 0.25) / (3 - 0.25)) * 100; ssSliderFill.style.width = percentage + "%"; document.querySelectorAll('.ss-pill').forEach(pill => { const pillVal = parseFloat(pill.dataset.speed); if(pillVal === val) { pill.classList.add('active'); pill.innerText = formatVal + " ✕"; } else { pill.classList.remove('active'); pill.innerText = pillVal.toFixed(2) + "x"; } }); }
    window.togglePitch = () => { savedPitch = !savedPitch; document.getElementById('pitchToggle').classList.toggle('active', savedPitch); video.preservesPitch = savedPitch; localStorage.setItem('aniplay_pitch', savedPitch); };

    let startY = 0, currentVol = 1, currentBright = 0; const gInfo = document.getElementById('gestureInfo'); const brightOverlay = document.getElementById('brightnessOverlay');
    function handleTouchStart(e) { if(!isLocked) startY = e.touches[0].clientY; }
    document.getElementById('leftGesture').addEventListener('touchstart', handleTouchStart);
    document.getElementById('leftGesture').addEventListener('touchmove', (e) => { if(isLocked) return; let diff = startY - e.touches[0].clientY; currentBright = Math.max(0, Math.min(0.8, currentBright + (diff > 0 ? -0.02 : 0.02))); brightOverlay.style.backgroundColor = `rgba(0,0,0,${currentBright})`; gInfo.innerText = `Brightness: ${Math.round((1 - currentBright)*100)}%`; gInfo.style.display = 'block'; startY = e.touches[0].clientY; });
    document.getElementById('rightGesture').addEventListener('touchstart', handleTouchStart);
    document.getElementById('rightGesture').addEventListener('touchmove', (e) => { if(isLocked) return; let diff = startY - e.touches[0].clientY; currentVol = Math.max(0, Math.min(2, currentVol + (diff > 0 ? 0.02 : -0.02))); setupAudio(); if(currentVol <= 1) { video.volume = currentVol; if(gainNode) gainNode.gain.value = 1; } else { video.volume = 1; if(gainNode) gainNode.gain.value = currentVol; } gInfo.innerText = `Volume: ${Math.round(currentVol * 100)}%`; gInfo.style.display = 'block'; startY = e.touches[0].clientY; });
    document.querySelectorAll('.gesture-zone').forEach(z => z.addEventListener('touchend', () => gInfo.style.display = 'none'));

    wrap.addEventListener('dblclick', (e) => { if(isLocked) return; if(e.target.closest('.icon-btn') || e.target.closest('.track') || e.target.closest('.bottom-sheet')) return; const rect = wrap.getBoundingClientRect(); if (e.clientX < rect.width / 2) triggerSkip(-10, null); else triggerSkip(10, null); });
    let lastTapTime = 0; function handleDoubleTap(e, amount) { if(isLocked) return; const ct = new Date().getTime(); const len = ct - lastTapTime; if (len < 300 && len > 0) { triggerSkip(amount, null); e.preventDefault(); } lastTapTime = ct; }
    document.getElementById('leftGesture').addEventListener('touchend', (e) => handleDoubleTap(e, -10)); document.getElementById('rightGesture').addEventListener('touchend', (e) => handleDoubleTap(e, 10));

    let isDragging = false, dragPct = 0; const tPreview = document.getElementById('timePreview');
    function getEventX(e) { return e.touches && e.touches.length > 0 ? e.touches[0].clientX : (e.changedTouches && e.changedTouches.length > 0 ? e.changedTouches[0].clientX : e.clientX); }
    function handleDrag(e) { const rect = track.getBoundingClientRect(); let pos = getEventX(e) - rect.left; pos = Math.max(0, Math.min(pos, rect.width)); dragPct = pos / rect.width; tPreview.innerText = formatTime(dragPct * (video.duration || 0)); tPreview.style.left = `${dragPct * 100}%`; tPreview.style.display = 'block'; if (isDragging) document.getElementById('progressBar').style.width = `${dragPct * 100}%`; }
    track.addEventListener('mousedown', (e) => { isDragging = true; handleDrag(e); }); document.addEventListener('mousemove', (e) => { if (isDragging) handleDrag(e); else if (e.target.closest('.track')) handleDrag(e); }); document.addEventListener('mouseup', () => { if (isDragging) { video.currentTime = dragPct * video.duration; isDragging = false; tPreview.style.display = 'none'; } }); track.addEventListener('mouseleave', () => { if (!isDragging) tPreview.style.display = 'none'; });
    track.addEventListener('touchstart', (e) => { isDragging = true; handleDrag(e); }); track.addEventListener('touchmove', (e) => { if (isDragging) { handleDrag(e); e.preventDefault(); } }, {passive: false}); track.addEventListener('touchend', () => { if (isDragging) { video.currentTime = dragPct * video.duration; isDragging = false; tPreview.style.display = 'none'; } });

    video.addEventListener('timeupdate', () => {
        if(!isDragging) { const curr = video.currentTime, dur = video.duration || 1; document.getElementById('progressBar').style.width = (curr / dur * 100) + '%'; if(video.buffered.length) document.getElementById('bufferBar').style.width = (video.buffered.end(video.buffered.length-1)/dur*100) + '%'; document.getElementById('currTime').innerText = formatTime(curr); document.getElementById('remTime').innerText = "-" + formatTime(dur - curr); }
        if(Math.floor(video.currentTime)%5===0 && epId) localStorage.setItem(`vid_${epId}`, video.currentTime);
        
        let showSkip = false, skipTarget = 0, btnText = "";
        let isNextEpisode = false;

        if (videoData) {
            const ct = video.currentTime;
            
            // Checking Intro
            if (videoData.introEnd && videoData.introEnd > 0 && ct >= videoData.introStart && ct <= videoData.introEnd) {
                showSkip = true; skipTarget = videoData.introEnd; btnText = "Skip Intro";
            }
            
            // Checking Outro -> Next Episode
            if (videoData.outroEnd && videoData.outroEnd > 0 && ct >= videoData.outroStart && ct <= videoData.outroEnd) {
                showSkip = true; skipTarget = videoData.outroEnd; btnText = "Next Episode";
                isNextEpisode = true;
            }
        }

        if(showSkip && !isLocked) { 
            skipPopup.style.display = 'block'; 
            skipPopup.innerText = btnText;
            
            // Button Click Logic
            skipPopup.onclick = async (e) => { 
                e.stopPropagation(); 
                skipPopup.style.display = 'none'; 
                
                if(isNextEpisode) {
                    skipPopup.innerText = "Loading...";
                    skipPopup.style.display = 'block';
                    try {
                        const currentOrder = videoData.orderIndex || 0;
                        const epRef = collection(videoDb, "series", seriesId, "episodes");
                        
                        // Query for next episode based on orderIndex
                        const q = query(epRef, where("orderIndex", ">", currentOrder), orderBy("orderIndex", "asc"), limit(1));
                        const querySnapshot = await getDocs(q);
                        
                        if(!querySnapshot.empty) {
                            const nextEpId = querySnapshot.docs[0].id;
                            window.location.href = `?seriesId=${seriesId}&epId=${nextEpId}`;
                        } else {
                            alert("Ye is series ka aakhiri episode hai!");
                            skipPopup.style.display = 'none'; 
                        }
                    } catch(err) {
                        console.error("Next episode error:", err);
                        alert("Next episode load karne me error aayi.");
                        skipPopup.style.display = 'none'; 
                    }
                } else {
                    // Intro skip logic
                    video.currentTime = skipTarget; 
                }
            }; 
        } else {
            skipPopup.style.display = 'none';
        }
    });

    track.addEventListener('click', (e) => { e.stopPropagation(); if(isLocked) return; const p = (e.clientX - track.getBoundingClientRect().left) / track.getBoundingClientRect().width; video.currentTime = p * video.duration; });
    function formatTime(sec) { if (isNaN(sec)) return "00:00"; let h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0'), s = Math.floor(sec % 60).toString().padStart(2, '0'); return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`; }

    let timeoutId;
    function showUI() { uiLayer.classList.remove('hidden'); isUiVisible = true; clearTimeout(timeoutId); timeoutId = setTimeout(() => { if(!video.paused && !isDragging) { uiLayer.classList.add('hidden'); closeAllSheets(); isUiVisible = false; } }, 3500); }
    function hideUI() { if(!video.paused) { uiLayer.classList.add('hidden'); closeAllSheets(); isUiVisible = false; } }

    wrap.addEventListener('click', (e) => {
        const aSheet = document.querySelector('.bottom-sheet.active');
        if (aSheet && !e.target.closest('.bottom-sheet')) { if(e.target.closest('.tr-icon') || e.target.closest('.hd-icon') || e.target.closest('.speed-text')) return; closeAllSheets(); showUI(); return; }
        if(e.target.closest('.icon-btn') || e.target.closest('.track') || e.target.closest('.skip-rect') || e.target.closest('.speed-text') || e.target.closest('.hd-icon')) { showUI(); return; }
        if(isUiVisible) hideUI(); else showUI();
    });

    let lastInteractType = ''; wrap.addEventListener('touchstart', () => { lastInteractType = 'touch'; }, {passive: true}); wrap.addEventListener('mousemove', () => { if(lastInteractType !== 'touch') showUI(); });
</script>
</body>
</html>
