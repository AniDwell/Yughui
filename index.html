<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="7c5148e29f17b24d40451451b4e24dc5ee9366b8" content="7c5148e29f17b24d40451451b4e24dc5ee9366b8" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniPlay Premium Player - Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --accent: #ffffff; --bg: #000000; --text-main: #ffffff; --text-sec: rgba(255, 255, 255, 0.6);
            --track-bg: rgba(255, 255, 255, 0.2); --fill-bg: #ffffff; --surface-dark: #121212; 
            --surface-light: #1e1e1e; --ad-color: #ffcc00;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: var(--bg); overflow: hidden; user-select: none; }
        .player-wrapper { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; }
        video { width: 100%; height: 100%; transition: object-fit 0.3s ease; }
        .spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid var(--fill-bg); border-radius: 50%; animation: spin 1s linear infinite; display: none; z-index: 40; pointer-events: none; }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .gesture-zone { position: absolute; top: 0; bottom: 0; width: 40%; z-index: 5; }
        #leftGesture { left: 0; } #rightGesture { right: 0; }
        #brightnessOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); pointer-events: none; z-index: 6; transition: background 0.1s; }
        .gesture-info { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(10, 10, 10, 0.9); padding: 12px 24px; border-radius: 30px; color: white; font-weight: bold; font-size: 18px; display: none; z-index: 20; pointer-events: none; backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; transition: opacity 0.3s ease; background: transparent; opacity: 1; pointer-events: none; }
        .ui-layer.hidden { opacity: 0; }
        .top-bar, .bottom-area, .center-controls { pointer-events: auto; }
        .top-gradient { position: absolute; top: 0; width: 100%; height: 150px; background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, transparent 100%); pointer-events: none; z-index: -1; }
        .bottom-gradient { position: absolute; bottom: 0; width: 100%; height: 150px; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%); pointer-events: none; z-index: -1; }
        .icon-btn { background: transparent; border: none; padding: 0; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.2s; opacity: 0.9; }
        .icon-btn svg { width: 100%; height: 100%; fill: var(--text-main); filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8)); transition: fill 0.2s; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); } .icon-btn.active svg { fill: var(--fill-bg); }
        .top-bar { display: flex; justify-content: space-between; padding: 20px 24px; width: 100%; }
        .titles { display: flex; flex-direction: column; gap: 2px; padding: 4px 8px;}
        .main-title { font-size: 18px; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.8); color: white;}
        .sub-title { font-size: 14px; color: var(--text-sec); font-style: italic; text-shadow: 0 1px 2px rgba(0,0,0,0.8);}
        .top-right { display: flex; align-items: center; gap: 24px; }
        .tr-icon { width: 24px; height: 24px; }
        .hd-icon { border: 1.5px solid white; border-radius: 3px; font-size: 10px; font-weight: bold; padding: 1px 4px; display: flex; align-items: center; justify-content: center; height: 18px; color: white; cursor: pointer; transition: 0.2s; }
        .center-controls { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 60px; align-items: center; z-index: 15; }
        .skip-icon { width: 44px; height: 44px; } .play-icon { width: 68px; height: 68px; }
        .float-text { position: absolute; top: 50%; color: white; font-weight: bold; font-size: 18px; pointer-events: none; opacity: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); white-space: nowrap; }
        .rotate-fwd svg { animation: spinFwd 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .rotate-bwd svg { animation: spinBwd 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        @keyframes spinFwd { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spinBwd { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
        .anim-float-fwd { animation: floatFwd 0.6s ease-out forwards; }
        .anim-float-bwd { animation: floatBwd 0.6s ease-out forwards; }
        @keyframes floatFwd { 0% { opacity: 1; transform: translate(0, -50%); } 100% { opacity: 0; transform: translate(40px, -50%); } }
        @keyframes floatBwd { 0% { opacity: 1; transform: translate(0, -50%); } 100% { opacity: 0; transform: translate(-40px, -50%); } }
        .bottom-area { padding: 0 24px 20px 24px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        .skip-rect { position: absolute; right: 24px; bottom: 85px; background: rgba(20, 20, 20, 0.85); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 8px 16px; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; display: none; z-index: 45; transition: background 0.2s; text-transform: uppercase;}
        .bottom-tools { display: flex; justify-content: space-between; align-items: center; padding-bottom: 5px; }
        .tools-group { display: flex; align-items: center; gap: 24px; }
        .bot-icon { width: 24px; height: 24px; }
        .speed-text { color: white; font-size: 14px; font-weight: 500; background: transparent; border: none; cursor: pointer; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .progress-row { display: flex; align-items: center; gap: 15px; width: 100%; position: relative; }
        .time { font-size: 13px; font-family: monospace; text-shadow: 0 1px 2px rgba(0,0,0,0.8); min-width: 45px; text-align: center; color: white;}
        .track { flex-grow: 1; height: 5px; background: var(--track-bg); position: relative; cursor: pointer; border-radius: 3px; transition: height 0.2s; }
        .track:hover { height: 8px; }
        .buffer { position: absolute; height: 100%; background: rgba(255,255,255,0.3); width: 0%; pointer-events: none; border-radius: 3px; }
        .progress { position: absolute; height: 100%; background: var(--fill-bg); width: 0%; pointer-events: none; border-radius: 3px; }
        .progress::after { content: ''; position: absolute; right: -9px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; background: white; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.8); transition: transform 0.1s; }
        .time-preview { position: absolute; bottom: 20px; left: 0; transform: translateX(-50%); background: rgba(20, 20, 20, 0.95); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; font-family: monospace; display: none; z-index: 25; }
        
        .player-wrapper.locked .top-bar, .player-wrapper.locked .center-controls, .player-wrapper.locked .progress-row, .player-wrapper.locked .tools-right, .player-wrapper.locked .scale-btn, .player-wrapper.locked .speed-text, .player-wrapper.locked .skip-rect { visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; }
        .player-wrapper.locked .gesture-zone { display: none; }
        .bottom-sheet { position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 100%); width: 100%; max-width: 600px; background: var(--surface-dark); border-radius: 24px 24px 0 0; padding: 24px; z-index: 60; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; gap: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.9); max-height: 85vh; overflow-y: auto; scrollbar-width: none; opacity: 0; pointer-events: none; border-top: 1px solid rgba(255,255,255,0.1); }
        .bottom-sheet::-webkit-scrollbar { display: none; }
        .bottom-sheet.active { transform: translate(-50%, 0); opacity: 1; pointer-events: auto; }
        .bs-header { font-size: 20px; color: white; font-weight: bold; margin-bottom: 5px; }
        .bs-list { display: flex; flex-direction: column; gap: 8px; }
        .bs-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--surface-light); border-radius: 8px; color: var(--text-sec); cursor: pointer; transition: 0.2s; font-size: 16px; font-weight: 500; border: 1px solid transparent; }
        .bs-item.active { background: white; color: black; font-weight: bold; }
        .bs-add-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 5px; }
        
        /* Custom Controls for Settings */
        .setting-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .setting-group h3 { color: white; font-size: 16px; margin: 0 0 10px 0; }
        .slider-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 15px;}
        .slider-row label { color: var(--text-sec); font-size: 14px; width: 80px;}
        .custom-slider { flex-grow: 1; -webkit-appearance: none; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; }
        .custom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border-radius: 50%; }
        .val-display { color: white; font-size: 14px; font-weight: bold; width: 45px; text-align: right;}
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .control-row label { color: var(--text-sec); font-size: 14px; }
        .styled-select, .styled-color { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 6px 10px; border-radius: 5px; outline: none; }
        .styled-color { padding: 0; width: 40px; height: 30px; cursor: pointer; }

        @media (max-width: 768px) { .center-controls { gap: 30px; } .play-icon { width: 56px; height: 56px; } .skip-icon { width: 36px; height: 36px; } .bottom-area { padding: 10px 15px 15px 15px; } .bottom-sheet { padding: 15px; } }
    </style>
</head>
<body>

<div class="player-wrapper" id="playerWrap">
    <div class="spinner" id="spinner"></div>
    <div id="brightnessOverlay"></div>
    <div class="gesture-info" id="gestureInfo">Volume: 100%</div>
    
    <video id="mainVideo" crossorigin="anonymous" playsinline></video>
    <audio id="externalAudio" crossorigin="anonymous"></audio>
    
    <div class="gesture-zone" id="leftGesture"></div><div class="gesture-zone" id="rightGesture"></div>

    <div class="ui-layer" id="uiLayer">
        <div class="top-gradient"></div><div class="bottom-gradient"></div>
        <div class="top-bar">
            <div class="top-left">
                <div class="titles">
                    <div class="main-title" id="tTitle">Initializing...</div>
                    <div class="sub-title" id="tSub">Waiting for URL parameters</div>
                </div>
            </div>
            <div class="top-right">
                <button class="icon-btn tr-icon" onclick="openSheet('subSheet', event)" title="Subtitles"><svg viewBox="0 0 24 24"><path d="M19 4H5c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 11H9.5v-1.5h-1.5v-2H9.5V10H11v5zm6 0h-1.5v-1.5h-1.5v-2h1.5V10H17v5z"/></svg></button>
                <button class="icon-btn tr-icon" onclick="openSheet('audioSheet', event)" title="Audio Tracks"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></button>
                <div class="hd-icon" onclick="openSheet('qualitySheet', event)">HD</div>
            </div>
        </div>

        <div class="center-controls">
            <div style="position: relative; display: flex; align-items: center; justify-content: center;">
                <div class="float-text" id="floatLeftTxt" style="right: 100%; margin-right: 15px;">-10s</div>
                <button class="icon-btn skip-icon" id="skipBackBtn" onclick="triggerSkip(-10, event)"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
            </div>
            <button class="icon-btn play-icon" id="playPauseBtn">
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div style="position: relative; display: flex; align-items: center; justify-content: center;">
                <button class="icon-btn skip-icon" id="skipFwdBtn" onclick="triggerSkip(10, event)"><svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg></button>
                <div class="float-text" id="floatRightTxt" style="left: 100%; margin-left: 15px;">+10s</div>
            </div>
        </div>

        <div class="bottom-area">
            <div class="bottom-tools">
                <div class="tools-group tools-left">
                    <button class="icon-btn bot-icon lock-btn" id="lockBtn" onclick="toggleLock()">
                        <svg id="unlockedIcon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                        <svg id="lockedIcon" viewBox="0 0 24 24" style="display:none; fill: #ffffff;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    </button>
                    <button class="icon-btn bot-icon scale-btn" onclick="cycleScaleMode()">
                        <svg id="iconFit" viewBox="0 0 24 24"><path d="M19 12h-2v3h-3v2h5v-5zM7 9h3V7H5v5h2V9zm14-6H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/></svg>
                        <svg id="iconCrop" viewBox="0 0 24 24" style="display:none;"><path d="M17 15h2V7c0-1.1-.9-2-2-2H9v2h8v8zM7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v4h2v-4h4v-2H7z"/></svg>
                        <svg id="iconStretch" viewBox="0 0 24 24" style="display:none;"><path d="M3 5v4h2V5h4V3H5c-1.1 0-2 .9-2 2zm2 10H3v4c0 1.1.9 2 2 2h4v-2H5v-4zm14 4h-4v2h4c1.1 0 2-.9 2-2v-4h-2v4zm0-16h-4v2h4v4h2V5c0-1.1-.9-2-2-2z"/></svg>
                    </button>
                    <button class="speed-text" id="speedBtn" onclick="openSheet('speedSheet', event)">1.0x</button>
                </div>
                <div class="tools-group tools-right">
                    <button class="icon-btn bot-icon" onclick="openSheet('settingsSheet', event)" title="Advanced Settings">
                        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.08.62-.08.94s.03.64.08.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    </button>
                    <button class="icon-btn bot-icon" onclick="togglePiP()"><svg viewBox="0 0 24 24"><path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 1.98 2 1.98h18c1.1 0 2-.88 2-1.98V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/></svg></button>
                    <button class="icon-btn bot-icon" onclick="toggleFullscreen()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
                </div>
            </div>
            <div class="progress-row">
                <span class="time" id="currTime">00:00</span>
                <div class="track" id="progressTrack"><div class="time-preview" id="timePreview">00:00</div><div class="buffer" id="bufferBar"></div><div class="progress" id="progressBar"></div></div>
                <span class="time" id="remTime">-00:00</span>
            </div>
        </div>
    </div>
    
    <button class="skip-rect" id="skipPopup">Skip Intro</button>

    <div class="bottom-sheet" id="qualitySheet"><div class="bs-header">Video Quality</div><div class="bs-list" id="qualityList"></div></div>
    <div class="bottom-sheet" id="subSheet">
        <div class="bs-header">Subtitles</div>
        <div class="bs-list" id="subList"><div class="bs-item active" onclick="selectDbSub(this, -1)">Off</div><button class="bs-add-btn" onclick="document.getElementById('localSub').click()">Add Custom Subtitle</button></div>
        <input type="file" id="localSub" style="display:none;" accept=".srt,.vtt">
    </div>
    <div class="bottom-sheet" id="audioSheet">
        <div class="bs-header">Audio Tracks</div><div class="bs-list" id="audioList"></div>
        <button class="bs-add-btn" onclick="document.getElementById('localAudio').click()">Add Custom Audio</button>
        <input type="file" id="localAudio" style="display:none;" accept="audio/*">
    </div>
    <div class="bottom-sheet" id="speedSheet">
        <div class="bs-header">Playback Speed</div>
        <div class="slider-row"><input type="range" min="0.25" max="3" step="0.05" value="1" class="custom-slider" id="ssSlider"><span class="val-display" id="ssValText">1.0x</span></div>
    </div>

    <div class="bottom-sheet" id="settingsSheet">
        <div class="bs-header">Advanced Settings</div>
        
        <div class="setting-group">
            <h3>Audio Controls</h3>
            <div class="slider-row"><label>Delay Sync</label><input type="range" id="audioDelay" class="custom-slider" min="-5" max="5" step="0.1" value="0"><span class="val-display" id="delayVal">0.0s</span></div>
            <div class="slider-row"><label>Bass</label><input type="range" id="eqBass" class="custom-slider" min="-15" max="15" step="1" value="0"><span class="val-display" id="bassVal">0dB</span></div>
            <div class="slider-row"><label>Mid</label><input type="range" id="eqMid" class="custom-slider" min="-15" max="15" step="1" value="0"><span class="val-display" id="midVal">0dB</span></div>
            <div class="slider-row"><label>Treble</label><input type="range" id="eqTreble" class="custom-slider" min="-15" max="15" step="1" value="0"><span class="val-display" id="trebleVal">0dB</span></div>
        </div>

        <div class="setting-group">
            <h3>Color Grading</h3>
            <div class="slider-row"><label>Brightness</label><input type="range" id="vidBright" class="custom-slider" min="50" max="150" value="100"><span class="val-display" id="brightVal">100%</span></div>
            <div class="slider-row"><label>Contrast</label><input type="range" id="vidContrast" class="custom-slider" min="50" max="150" value="100"><span class="val-display" id="contrastVal">100%</span></div>
            <div class="slider-row"><label>Saturation</label><input type="range" id="vidSat" class="custom-slider" min="0" max="200" value="100"><span class="val-display" id="satVal">100%</span></div>
            <div class="slider-row"><label>Hue</label><input type="range" id="vidHue" class="custom-slider" min="-180" max="180" value="0"><span class="val-display" id="hueVal">0°</span></div>
        </div>

        <div class="setting-group" style="border-bottom:none;">
            <h3>Subtitles Style</h3>
            <div class="slider-row"><label>Font Size</label><input type="range" id="subSize" class="custom-slider" min="12" max="40" value="20"><span class="val-display" id="subSizeVal">20px</span></div>
            <div class="slider-row"><label>Bg Opacity</label><input type="range" id="subOp" class="custom-slider" min="0" max="1" step="0.1" value="0.8"><span class="val-display" id="subOpVal">0.8</span></div>
            <div class="control-row"><label>Text Color</label><input type="color" id="subColor" class="styled-color" value="#ffffff"></div>
            <div class="control-row"><label>Font Family</label>
                <select id="subFont" class="styled-select">
                    <option value="sans-serif">Default (Sans)</option><option value="serif">Serif</option><option value="monospace">Monospace</option><option value="cursive">Cursive</option>
                </select>
            </div>
        </div>
        <button class="bs-add-btn" onclick="resetSettings()">Reset All Settings</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const videoApp = initializeApp({ apiKey: "AIzaSyAPLj8br4ZbM0OSRCQ80GNqyjXZ6fRAKOA", authDomain: "wuhq8q8q.firebaseapp.com", projectId: "wuhq8q8q", storageBucket: "wuhq8q8q.firebasestorage.app" }, "videoApp");
    const videoDb = getFirestore(videoApp);
    const params = new URLSearchParams(window.location.search);
    const seriesId = params.get('seriesId'); const epId = params.get('epId');
    const video = document.getElementById('mainVideo'), extAudio = document.getElementById('externalAudio');
    const uiLayer = document.getElementById('uiLayer'), playPauseBtn = document.getElementById('playPauseBtn');
    const skipPopup = document.getElementById('skipPopup'), track = document.getElementById('progressTrack');
    const wrap = document.getElementById('playerWrap'), spinner = document.getElementById('spinner');

    let videoData = null, nextEpId = null, isLocked = false, isUiVisible = true;
    let useExtAudio = false, hlsEngine = null;

    // --- SETTINGS STATE & LOCAL STORAGE ---
    let savedSpeed = parseFloat(localStorage.getItem('aniplay_speed')) || 1;
    let audioDelay = parseFloat(localStorage.getItem('ani_delay')) || 0;
    
    // EQ States
    let eqVals = JSON.parse(localStorage.getItem('ani_eq')) || { bass: 0, mid: 0, treble: 0 };
    // Video Color States
    let vidColors = JSON.parse(localStorage.getItem('ani_colors')) || { bright: 100, contrast: 100, sat: 100, hue: 0 };
    // Subtitle States
    let subPrefs = JSON.parse(localStorage.getItem('ani_subs')) || { size: 20, color: '#ffffff', bg: 0.8, font: 'sans-serif' };

    // Initialize UI Inputs
    document.getElementById('audioDelay').value = audioDelay; document.getElementById('delayVal').innerText = audioDelay > 0 ? '+'+audioDelay+'s' : audioDelay+'s';
    document.getElementById('eqBass').value = eqVals.bass; document.getElementById('bassVal').innerText = eqVals.bass+'dB';
    document.getElementById('eqMid').value = eqVals.mid; document.getElementById('midVal').innerText = eqVals.mid+'dB';
    document.getElementById('eqTreble').value = eqVals.treble; document.getElementById('trebleVal').innerText = eqVals.treble+'dB';
    
    document.getElementById('vidBright').value = vidColors.bright; document.getElementById('brightVal').innerText = vidColors.bright+'%';
    document.getElementById('vidContrast').value = vidColors.contrast; document.getElementById('contrastVal').innerText = vidColors.contrast+'%';
    document.getElementById('vidSat').value = vidColors.sat; document.getElementById('satVal').innerText = vidColors.sat+'%';
    document.getElementById('vidHue').value = vidColors.hue; document.getElementById('hueVal').innerText = vidColors.hue+'°';
    
    document.getElementById('subSize').value = subPrefs.size; document.getElementById('subSizeVal').innerText = subPrefs.size+'px';
    document.getElementById('subOp').value = subPrefs.bg; document.getElementById('subOpVal').innerText = subPrefs.bg;
    document.getElementById('subColor').value = subPrefs.color;
    document.getElementById('subFont').value = subPrefs.font;

    function applyVideoColors() {
        video.style.filter = `brightness(${vidColors.bright}%) contrast(${vidColors.contrast}%) saturate(${vidColors.sat}%) hue-rotate(${vidColors.hue}deg)`;
        localStorage.setItem('ani_colors', JSON.stringify(vidColors));
    }
    applyVideoColors();

    function applySubtitleStyles() {
        let styleTag = document.getElementById('customSubStyle');
        if(!styleTag) { styleTag = document.createElement('style'); styleTag.id = 'customSubStyle'; document.head.appendChild(styleTag); }
        styleTag.innerHTML = `::cue { font-size: ${subPrefs.size}px !important; color: ${subPrefs.color} !important; background-color: rgba(0,0,0, ${subPrefs.bg}) !important; font-family: ${subPrefs.font}, sans-serif !important; }`;
        localStorage.setItem('ani_subs', JSON.stringify(subPrefs));
    }
    applySubtitleStyles();

    // Event Listeners for Settings
    document.getElementById('audioDelay').addEventListener('input', e => { audioDelay = parseFloat(e.target.value); document.getElementById('delayVal').innerText = audioDelay > 0 ? '+'+audioDelay+'s' : audioDelay+'s'; localStorage.setItem('ani_delay', audioDelay); });
    document.getElementById('eqBass').addEventListener('input', e => { eqVals.bass = e.target.value; document.getElementById('bassVal').innerText = eqVals.bass+'dB'; updateEQ(); });
    document.getElementById('eqMid').addEventListener('input', e => { eqVals.mid = e.target.value; document.getElementById('midVal').innerText = eqVals.mid+'dB'; updateEQ(); });
    document.getElementById('eqTreble').addEventListener('input', e => { eqVals.treble = e.target.value; document.getElementById('trebleVal').innerText = eqVals.treble+'dB'; updateEQ(); });
    
    document.getElementById('vidBright').addEventListener('input', e => { vidColors.bright = e.target.value; document.getElementById('brightVal').innerText = vidColors.bright+'%'; applyVideoColors(); });
    document.getElementById('vidContrast').addEventListener('input', e => { vidColors.contrast = e.target.value; document.getElementById('contrastVal').innerText = vidColors.contrast+'%'; applyVideoColors(); });
    document.getElementById('vidSat').addEventListener('input', e => { vidColors.sat = e.target.value; document.getElementById('satVal').innerText = vidColors.sat+'%'; applyVideoColors(); });
    document.getElementById('vidHue').addEventListener('input', e => { vidColors.hue = e.target.value; document.getElementById('hueVal').innerText = vidColors.hue+'°'; applyVideoColors(); });
    
    document.getElementById('subSize').addEventListener('input', e => { subPrefs.size = e.target.value; document.getElementById('subSizeVal').innerText = subPrefs.size+'px'; applySubtitleStyles(); });
    document.getElementById('subOp').addEventListener('input', e => { subPrefs.bg = e.target.value; document.getElementById('subOpVal').innerText = subPrefs.bg; applySubtitleStyles(); });
    document.getElementById('subColor').addEventListener('input', e => { subPrefs.color = e.target.value; applySubtitleStyles(); });
    document.getElementById('subFont').addEventListener('change', e => { subPrefs.font = e.target.value; applySubtitleStyles(); });

    window.resetSettings = () => {
        localStorage.removeItem('ani_delay'); localStorage.removeItem('ani_eq'); localStorage.removeItem('ani_colors'); localStorage.removeItem('ani_subs');
        location.reload();
    };

    // --- WEB AUDIO API (Equalizer) ---
    let audioCtx, vidSourceNode, extSourceNode, gainNode, lowNode, midNode, highNode;
    let isAudioSetup = false;

    function setupAudio() {
        if (isAudioSetup) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            vidSourceNode = audioCtx.createMediaElementSource(video);
            extSourceNode = audioCtx.createMediaElementSource(extAudio);

            lowNode = audioCtx.createBiquadFilter(); lowNode.type = 'lowshelf'; lowNode.frequency.value = 250;
            midNode = audioCtx.createBiquadFilter(); midNode.type = 'peaking'; midNode.frequency.value = 1000; midNode.Q.value = 1;
            highNode = audioCtx.createBiquadFilter(); highNode.type = 'highshelf'; highNode.frequency.value = 4000;
            gainNode = audioCtx.createGain();

            // Connect both sources to the EQ chain
            vidSourceNode.connect(lowNode);
            extSourceNode.connect(lowNode);
            lowNode.connect(midNode);
            midNode.connect(highNode);
            highNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            isAudioSetup = true;
            updateEQ();
        } catch(e) { console.warn("EQ setup failed. CORS issues may prevent it on some hosts.", e); }
    }

    function updateEQ() {
        if(!isAudioSetup) return;
        lowNode.gain.value = eqVals.bass;
        midNode.gain.value = eqVals.mid;
        highNode.gain.value = eqVals.treble;
        localStorage.setItem('ani_eq', JSON.stringify(eqVals));
    }


    // --- DATA LOADING ---
    async function loadVideo() {
        if(!seriesId || !epId) { document.getElementById('tTitle').innerText = "URL ERROR"; return; }
        try {
            spinner.style.display = 'block';
            const snap = await getDoc(doc(videoDb, "series", seriesId, "episodes", epId));
            if(snap.exists()) {
                videoData = snap.data(); checkNextEpisode();
                const qList = document.getElementById('qualityList'), aList = document.getElementById('audioList'), sList = document.getElementById('subList');

                if (videoData.m3u8Url && videoData.m3u8Url.trim() !== "") {
                    let mainUrl = videoData.m3u8Url.trim();
                    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                        hlsEngine = new Hls(); hlsEngine.loadSource(mainUrl); hlsEngine.attachMedia(video);
                        hlsEngine.on(Hls.Events.MANIFEST_PARSED, (e, d) => {
                            qList.innerHTML = '<div class="bs-item active" onclick="selectHlsQuality(this, -1)">Auto</div>';
                            d.levels.forEach((l, i) => { qList.innerHTML += `<div class="bs-item" onclick="selectHlsQuality(this, ${i})">${l.height}p</div>`; });
                        });
                        hlsEngine.on(Hls.Events.AUDIO_TRACKS_UPDATED, (e, d) => {
                            if (d.audioTracks && d.audioTracks.length > 1) {
                                aList.innerHTML = '';
                                d.audioTracks.forEach((t, i) => {
                                    aList.innerHTML += `<div class="bs-item${(i===hlsEngine.audioTrack)?' active':''}" onclick="selectHlsAudio(this, ${i})">${t.name || 'Audio '+(i+1)}</div>`;
                                });
                                useExtAudio = false; video.muted = false; 
                            } else loadDbAudios(videoData);
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = mainUrl; loadDbAudios(videoData); }
                } else {
                    let allSources = videoData.illusions ? videoData.illusions : videoData.videos;
                    if(allSources && allSources.length > 0) {
                        video.src = allSources[0].url;
                        allSources.forEach((s, i) => {
                            const div = document.createElement('div'); div.className = 'bs-item'+(i===0?' active':''); div.innerText = s.qualityName || s.quality || 'HD';
                            div.onclick = function(){ selectQuality(this, s.url); }; qList.appendChild(div);
                        });
                    }
                    loadDbAudios(videoData);
                }

                if(videoData.subtitles) videoData.subtitles.forEach((s, i) => {
                    const t = document.createElement('track'); t.kind='captions'; t.label=s.language||s.name; t.src=s.url; video.appendChild(t);
                    const div = document.createElement('div'); div.className='bs-item'; div.innerText=t.label;
                    div.onclick = function(){ selectDbSub(this, i); }; sList.insertBefore(div, sList.lastElementChild.previousElementSibling);
                });

                document.getElementById('tTitle').innerText = videoData.title || "Episode";
                document.getElementById('tSub').innerText = videoData.description || "";

                const st = parseFloat(localStorage.getItem(`vid_${epId}`));
                if(st) {
                    if(video.readyState >= 1) video.currentTime = st; 
                    else video.addEventListener('loadedmetadata', () => { if(video.currentTime===0) video.currentTime = st; }, {once:true});
                }
                setPlaybackSpeed(savedSpeed);
            } else spinner.style.display = 'none';
        } catch(e) { spinner.style.display = 'none'; }
    }

    function loadDbAudios(d) {
        const aList = document.getElementById('audioList');
        if(d.audios && d.audios.length > 0) {
            aList.innerHTML = '';
            d.audios.forEach((a, i) => {
                const div = document.createElement('div'); div.className='bs-item'+(i===0?' active':''); div.innerText=a.language||a.name;
                div.onclick = function(){ selectAudio(this, a.url); }; aList.appendChild(div);
                if(i===0) { useExtAudio = true; video.muted = true; extAudio.src = a.url; }
            });
        }
    }

    async function checkNextEpisode() {
        try {
            const q = query(collection(videoDb, "series", seriesId, "episodes"), where("orderIndex", ">", videoData.orderIndex||0), orderBy("orderIndex", "asc"), limit(1));
            const snap = await getDocs(q); if(!snap.empty) nextEpId = snap.docs[0].id;
        } catch(e){}
    }
    loadVideo();

    // --- BULLETPROOF AUDIO SYNC (Video Never Pauses For Audio Buffer) ---
    let isIntendedToPlay = false;

    playPauseBtn.addEventListener('click', (e) => { 
        e.stopPropagation(); setupAudio(); 
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); 
        if(video.paused) {
            isIntendedToPlay = true; video.play().catch(()=>{}); if(useExtAudio) extAudio.play().catch(()=>{});
        } else {
            isIntendedToPlay = false; video.pause(); if(useExtAudio) extAudio.pause();
        }
    });

    video.addEventListener('play', () => { document.getElementById('playIcon').style.display='none'; document.getElementById('pauseIcon').style.display='block'; hideUI(); if(useExtAudio && isIntendedToPlay) extAudio.play().catch(()=>{}); });
    video.addEventListener('pause', () => { document.getElementById('playIcon').style.display='block'; document.getElementById('pauseIcon').style.display='none'; showUI(); if(useExtAudio && !isIntendedToPlay) extAudio.pause(); });
    
    video.addEventListener('seeking', () => { if(useExtAudio && extAudio.readyState >= 1) extAudio.currentTime = video.currentTime + audioDelay; });
    video.addEventListener('waiting', () => { spinner.style.display = 'block'; if(useExtAudio) extAudio.pause(); });
    video.addEventListener('playing', () => { spinner.style.display = 'none'; if(useExtAudio && isIntendedToPlay) extAudio.play().catch(()=>{}); });

    extAudio.addEventListener('error', () => { useExtAudio = false; if(isIntendedToPlay) video.play().catch(()=>{}); });
    video.addEventListener('ratechange', () => { if(useExtAudio) extAudio.playbackRate = video.playbackRate; });

    // Core Timeupdate Sync
    video.addEventListener('timeupdate', () => {
        // CONTINUOUS SYNC LOGIC (Handles Buffering Safely)
        if (useExtAudio && isIntendedToPlay && !video.paused) {
            // Check if audio has buffered enough to play
            if (extAudio.readyState >= 3) {
                let targetAudio = video.currentTime + audioDelay;
                // If it drifted heavily, correct it
                if (Math.abs(extAudio.currentTime - targetAudio) > 0.3) {
                    extAudio.currentTime = targetAudio;
                }
                if (extAudio.paused) extAudio.play().catch(()=>{});
            }
        }

        if(!isDragging) { 
            const curr = video.currentTime, dur = video.duration || 1; 
            document.getElementById('progressBar').style.width = (curr / dur * 100) + '%'; 
            if(video.buffered.length) document.getElementById('bufferBar').style.width = (video.buffered.end(video.buffered.length-1)/dur*100) + '%'; 
            document.getElementById('currTime').innerText = formatTime(curr); 
            document.getElementById('remTime').innerText = "-" + formatTime(dur - curr); 
        }
        
        if(Math.floor(video.currentTime)%5===0 && epId) localStorage.setItem(`vid_${epId}`, video.currentTime);
        
        let showSkip = false, skipTarget = 0, btnText = "";
        let actionType = "skip"; 

        if (videoData) {
            const ct = video.currentTime;
            if (videoData.introEnd && videoData.introEnd > 0 && ct >= videoData.introStart && ct <= videoData.introEnd) {
                showSkip = true; skipTarget = videoData.introEnd; btnText = "Skip Intro"; actionType = "skip";
            }
            if (videoData.outroEnd && videoData.outroEnd > 0 && ct >= videoData.outroStart && ct <= videoData.outroEnd) {
                showSkip = true; 
                skipTarget = videoData.outroEnd;
                if(nextEpId) { btnText = "Next Episode"; actionType = "next"; } 
                else { btnText = "Skip Outro"; actionType = "skip"; }
            }
        }

        if(showSkip && !isLocked) { 
            skipPopup.style.display = 'block'; 
            skipPopup.innerText = btnText;
            
            skipPopup.onclick = async (e) => { 
                e.stopPropagation(); 
                skipPopup.style.display = 'none'; 
                if(actionType === "next") {
                    skipPopup.innerText = "Loading...";
                    skipPopup.style.display = 'block';
                    window.location.href = `?seriesId=${seriesId}&epId=${nextEpId}`;
                } else {
                    if(btnText === "Skip Outro") video.currentTime = video.duration;
                    else video.currentTime = skipTarget; 
                }
            }; 
        } else {
            skipPopup.style.display = 'none';
        }
    });

    // --- CORE CONTROLS & GESTURES ---
    window.triggerSkip = (amount, e) => {
        if(e) e.stopPropagation(); if(isLocked) return; video.currentTime += amount; showUI(); 
        if (amount > 0) { const btn = document.getElementById('skipFwdBtn'); const txt = document.getElementById('floatRightTxt'); btn.classList.remove('rotate-fwd'); txt.classList.remove('anim-float-fwd'); void btn.offsetWidth; btn.classList.add('rotate-fwd'); txt.classList.add('anim-float-fwd'); } 
        else { const btn = document.getElementById('skipBackBtn'); const txt = document.getElementById('floatLeftTxt'); btn.classList.remove('rotate-bwd'); txt.classList.remove('anim-float-bwd'); void btn.offsetWidth; btn.classList.add('rotate-bwd'); txt.classList.add('anim-float-bwd'); }
    };

    window.toggleFullscreen = () => { if (!document.fullscreenElement) { wrap.requestFullscreen(); screen.orientation?.lock('landscape').catch(()=>{}); } else { document.exitFullscreen(); screen.orientation?.unlock(); } };
    window.togglePiP = async () => { if(document.pictureInPictureEnabled) await video.requestPictureInPicture(); };
    
    window.toggleLock = () => { 
        isLocked = !isLocked; wrap.classList.toggle('locked', isLocked); 
        document.getElementById('unlockedIcon').style.display = isLocked ? 'none' : 'block';
        document.getElementById('lockedIcon').style.display = isLocked ? 'block' : 'none';
        if(isLocked) { closeAllSheets(); showUI(); }
    };
    
    window.openSheet = (id, e) => { if(e) e.stopPropagation(); closeAllSheets(); document.getElementById(id).classList.add('active'); };
    window.closeAllSheets = () => { document.querySelectorAll('.bottom-sheet').forEach(sheet => sheet.classList.remove('active')); };

    window.selectQuality = (elem, url) => { 
        document.querySelectorAll('#qualityList .bs-item').forEach(el => el.classList.remove('active')); 
        elem.classList.add('active'); 
        if(url && video.src !== url) { 
            const ct = video.currentTime; 
            const p = video.paused; 
            video.src = url; 
            const resumeFunc = () => {
                try { video.currentTime = ct; } catch(e){}
                if(!p) video.play().catch(()=>{}); 
            };
            if(video.readyState >= 1) resumeFunc();
            else video.addEventListener('loadedmetadata', resumeFunc, { once: true });
        } 
        closeAllSheets(); 
    };
    
    window.selectHlsQuality = (elem, levelIndex) => { document.querySelectorAll('#qualityList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(hlsEngine) hlsEngine.currentLevel = levelIndex; closeAllSheets(); };
    window.selectHlsAudio = (elem, trackIndex) => { document.querySelectorAll('#audioList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(hlsEngine) hlsEngine.audioTrack = trackIndex; closeAllSheets(); };
    window.selectDbSub = (elem, trackIndex) => { document.querySelectorAll('#subList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); for (let i = 0; i < video.textTracks.length; i++) video.textTracks[i].mode = 'disabled'; if (trackIndex !== -1 && video.textTracks[trackIndex]) video.textTracks[trackIndex].mode = 'showing'; closeAllSheets(); };
    window.selectAudio = (elem, url) => { document.querySelectorAll('#audioList .bs-item').forEach(el => el.classList.remove('active')); elem.classList.add('active'); if(url) { useExtAudio = true; video.muted = true; extAudio.src = url; extAudio.currentTime = video.currentTime + audioDelay; if(!video.paused) extAudio.play(); } else { useExtAudio = false; video.muted = false; extAudio.pause(); } closeAllSheets(); };

    document.getElementById('localSub').addEventListener('change', e => { if(e.target.files[0]) { const fileName = e.target.files[0].name; const t = document.createElement('track'); t.kind='captions'; t.src=URL.createObjectURL(e.target.files[0]); t.default=true; video.appendChild(t); const newItem = document.createElement('div'); newItem.className = 'bs-item active'; newItem.innerText = fileName.length > 20 ? fileName.substring(0, 20) + "..." : fileName; const newIndex = video.textTracks.length; newItem.onclick = function() { selectDbSub(this, newIndex); }; const sList = document.getElementById('subList'); document.querySelectorAll('#subList .bs-item').forEach(el => el.classList.remove('active')); sList.insertBefore(newItem, sList.lastElementChild.previousElementSibling); closeAllSheets(); } });
    document.getElementById('localAudio').addEventListener('change', e => { if(e.target.files[0]) { const fileName = e.target.files[0].name; const newItem = document.createElement('div'); newItem.className = 'bs-item active'; newItem.innerText = fileName.length > 20 ? fileName.substring(0, 20) + "..." : fileName; newItem.onclick = function() { selectAudio(this, URL.createObjectURL(e.target.files[0])); }; document.querySelectorAll('#audioList .bs-item').forEach(el => el.classList.remove('active')); document.getElementById('audioList').insertBefore(newItem, document.getElementById('audioList').lastElementChild); closeAllSheets(); } });

    const ssSlider = document.getElementById('ssSlider'); const ssValText = document.getElementById('ssValText');
    window.setPlaybackSpeed = (val) => { video.playbackRate = val; ssSlider.value = val; updateSpeedUI(val); localStorage.setItem('aniplay_speed', val); };
    ssSlider.addEventListener('input', (e) => { const val = parseFloat(e.target.value); video.playbackRate = val; updateSpeedUI(val); localStorage.setItem('aniplay_speed', val); });
    function updateSpeedUI(val) { const formatVal = val.toFixed(2) + "x"; document.getElementById('speedBtn').innerText = formatVal; ssValText.innerText = formatVal; }

    let startY = 0, currentVol = 1, currentBright = 0; const gInfo = document.getElementById('gestureInfo'); const brightOverlay = document.getElementById('brightnessOverlay');
    function handleTouchStart(e) { if(!isLocked) startY = e.touches[0].clientY; }
    document.getElementById('leftGesture').addEventListener('touchstart', handleTouchStart);
    document.getElementById('leftGesture').addEventListener('touchmove', (e) => { if(isLocked) return; let diff = startY - e.touches[0].clientY; currentBright = Math.max(0, Math.min(0.8, currentBright + (diff > 0 ? -0.02 : 0.02))); brightOverlay.style.backgroundColor = `rgba(0,0,0,${currentBright})`; gInfo.innerText = `Brightness: ${Math.round((1 - currentBright)*100)}%`; gInfo.style.display = 'block'; startY = e.touches[0].clientY; });
    document.getElementById('rightGesture').addEventListener('touchstart', handleTouchStart);
    document.getElementById('rightGesture').addEventListener('touchmove', (e) => { if(isLocked) return; let diff = startY - e.touches[0].clientY; currentVol = Math.max(0, Math.min(3, currentVol + (diff > 0 ? 0.02 : -0.02))); setupAudio(); if(currentVol <= 1) { video.volume = currentVol; if(gainNode) gainNode.gain.value = 1; } else { video.volume = 1; if(gainNode) gainNode.gain.value = currentVol; } gInfo.innerText = `Volume: ${Math.round(currentVol * 100)}%`; gInfo.style.display = 'block'; startY = e.touches[0].clientY; });
    document.querySelectorAll('.gesture-zone').forEach(z => z.addEventListener('touchend', () => gInfo.style.display = 'none'));

    wrap.addEventListener('dblclick', (e) => { if(isLocked) return; if(e.target.closest('.icon-btn') || e.target.closest('.track') || e.target.closest('.bottom-sheet') || e.target.closest('.custom-slider')) return; const rect = wrap.getBoundingClientRect(); if (e.clientX < rect.width / 2) triggerSkip(-10, null); else triggerSkip(10, null); });
    let lastTapTime = 0; function handleDoubleTap(e, amount) { if(isLocked) return; const ct = new Date().getTime(); const len = ct - lastTapTime; if (len < 300 && len > 0) { triggerSkip(amount, null); e.preventDefault(); } lastTapTime = ct; }
    document.getElementById('leftGesture').addEventListener('touchend', (e) => handleDoubleTap(e, -10)); document.getElementById('rightGesture').addEventListener('touchend', (e) => handleDoubleTap(e, 10));

    let isDragging = false, dragPct = 0; const tPreview = document.getElementById('timePreview');
    function getEventX(e) { return e.touches && e.touches.length > 0 ? e.touches[0].clientX : (e.changedTouches && e.changedTouches.length > 0 ? e.changedTouches[0].clientX : e.clientX); }
    function handleDrag(e) { const rect = track.getBoundingClientRect(); let pos = getEventX(e) - rect.left; pos = Math.max(0, Math.min(pos, rect.width)); dragPct = pos / rect.width; tPreview.innerText = formatTime(dragPct * (video.duration || 0)); tPreview.style.left = `${dragPct * 100}%`; tPreview.style.display = 'block'; if (isDragging) document.getElementById('progressBar').style.width = `${dragPct * 100}%`; }
    track.addEventListener('mousedown', (e) => { isDragging = true; handleDrag(e); }); document.addEventListener('mousemove', (e) => { if (isDragging) handleDrag(e); else if (e.target.closest('.track')) handleDrag(e); }); document.addEventListener('mouseup', () => { if (isDragging) { video.currentTime = dragPct * video.duration; isDragging = false; tPreview.style.display = 'none'; } }); track.addEventListener('mouseleave', () => { if (!isDragging) tPreview.style.display = 'none'; });
    track.addEventListener('touchstart', (e) => { isDragging = true; handleDrag(e); }); track.addEventListener('touchmove', (e) => { if (isDragging) { handleDrag(e); e.preventDefault(); } }, {passive: false}); track.addEventListener('touchend', () => { if (isDragging) { video.currentTime = dragPct * video.duration; isDragging = false; tPreview.style.display = 'none'; } });

    track.addEventListener('click', (e) => { e.stopPropagation(); if(isLocked) return; const p = (e.clientX - track.getBoundingClientRect().left) / track.getBoundingClientRect().width; video.currentTime = p * video.duration; });
    function formatTime(sec) { if (isNaN(sec)) return "00:00"; let h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0'), s = Math.floor(sec % 60).toString().padStart(2, '0'); return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`; }

    let timeoutId;
    function showUI() { uiLayer.classList.remove('hidden'); isUiVisible = true; clearTimeout(timeoutId); timeoutId = setTimeout(() => { if(!video.paused && !isDragging) { uiLayer.classList.add('hidden'); closeAllSheets(); isUiVisible = false; } }, 3500); }
    function hideUI() { if(!video.paused) { uiLayer.classList.add('hidden'); closeAllSheets(); isUiVisible = false; } }

    wrap.addEventListener('click', (e) => {
        const aSheet = document.querySelector('.bottom-sheet.active');
        if (aSheet && !e.target.closest('.bottom-sheet')) { if(e.target.closest('.tr-icon') || e.target.closest('.hd-icon') || e.target.closest('.speed-text') || e.target.closest('.bot-icon')) return; closeAllSheets(); showUI(); return; }
        if(e.target.closest('.icon-btn') || e.target.closest('.track') || e.target.closest('.speed-text') || e.target.closest('.hd-icon')) { showUI(); return; }
        if(e.target.closest('.skip-rect')) return; 
        
        if(isUiVisible) hideUI(); else showUI();
    });

    let lastInteractType = ''; wrap.addEventListener('touchstart', () => { lastInteractType = 'touch'; }, {passive: true}); wrap.addEventListener('mousemove', () => { if(lastInteractType !== 'touch') showUI(); });
</script>
